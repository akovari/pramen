[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `paste` is unmaintained but trivially small and compile-time only; it
    # arrives via datafusion/arrow. Drop this when upstream migrates.
    "RUSTSEC-2024-0436",
    # quick-xml < 0.41 CPU/memory DoS via crafted XML. Reaches us only as
    # object_store's parser for S3 list/error responses, i.e. XML from the
    # operator-configured endpoint, not arbitrary untrusted input; impact is
    # DoS only. datafusion 50 pins object_store 0.12 (quick-xml 0.38); the
    # fix arrives with the object_store >= 0.13 / next datafusion major
    # upgrade. Drop both entries then.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # rustls-pemfile is unmaintained (archived); object_store 0.12 pulls it
    # for Azure/GCS TLS client config. It is a thin wrapper over
    # rustls-pki-types PEM parsing. No safe upgrade until object_store drops
    # the dependency (bundled with the same datafusion/object_store bump).
    "RUSTSEC-2025-0134",
    # Wasmtime 38.x (X1.1 WASM host): open advisories for sandbox escapes,
    # WASI edge cases, and Winch/Cranelift bugs. Guests are operator-supplied
    # components run with fuel/memory limits and no ambient WASI filesystem;
    # impact is confined to the transform sandbox. Revisit on each wasmtime
    # minor bump and drop as upstream fixes land.
    "RUSTSEC-2026-0006",
    "RUSTSEC-2026-0020",
    "RUSTSEC-2026-0021",
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0094",
    "RUSTSEC-2026-0095",
    "RUSTSEC-2026-0096",
    "RUSTSEC-2026-0114",
    "RUSTSEC-2026-0149",
    "RUSTSEC-2026-0182",
    "RUSTSEC-2026-0188",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    # Permissive BSD-style license used by libbz2-rs-sys (via datafusion's
    # bzip2 decompression support).
    "bzip2-1.0.6",
    # Permissive data license used by webpki-roots (the Mozilla CA
    # certificate bundle, via rustls in reqwest).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path-only dependencies are fine while crates are unpublished.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
