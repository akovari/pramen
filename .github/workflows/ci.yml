name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install && rustup component add clippy rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # All targets are blocking tier-1. Container-backed integration
        # tests (Postgres, MinIO) will be gated to Linux runners by test
        # harness features, not by skipping this matrix.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --profile ci
      - run: cargo test --doc --workspace

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: "1.85"
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install && rustup component add llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      # TODO(F2): enable the ratchet (--fail-under-lines) once pramen-core
      # and pramen-ai contain real code; a floor on the skeleton is noise.
      - run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  deny:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
