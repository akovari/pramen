name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Rust 1.97+: cargo-level warning denial. Unlike `RUSTFLAGS: -D warnings`
  # this does not change compiler flags, so it never invalidates the build
  # cache. Older cargo (the MSRV job) ignores the unknown config key.
  CARGO_BUILD_WARNINGS: deny

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install && rustup component add clippy rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      # Warnings are denied via CARGO_BUILD_WARNINGS, not `-D warnings`.
      - run: cargo clippy --workspace --all-targets

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # All targets are blocking tier-1. Container-backed integration
        # tests (Postgres, MinIO) will be gated to Linux runners by test
        # harness features, not by skipping this matrix.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --profile ci
      - run: cargo test --doc --workspace

  l2-postgres:
    # The container-backed L2 layer (ADR 0005): the same test binaries as
    # the matrix job, but with a real PostgreSQL service so the
    # env-guarded delivery-contract and fault tests actually run.
    name: L2 (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: l2
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PRAMEN_TEST_POSTGRES_DSN: postgres://postgres:l2@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run -p pramen-io -p pramen --profile ci

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: "1.88"
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.88
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install && rustup component add llvm-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      # TODO(F2): enable the ratchet (--fail-under-lines) once pramen-core
      # and pramen-ai contain real code; a floor on the skeleton is noise.
      - run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info

  deny:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  deploy-artifacts:
    # X2.2: unit files + Grafana JSON parse offline (no AWS).
    name: Deploy artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/validate-deploy.sh

  reproduce-artifact:
    # E2.4: offline research figures must match generators (no Postgres/cloud).
    name: Reproduce artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: ./scripts/reproduce-artifact.sh --check

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  quickstart:
    # The documented quickstart, executed for real (P1.18): binary + one
    # YAML file -> governed AI-enriched rows in PostgreSQL, timed against
    # the ten-minute bar. If the docs' steps drift from reality, this fails.
    name: Quickstart
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: quickstart
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      PRAMEN_POSTGRES_DSN: postgres://postgres:quickstart@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p pramen
      - run: PRAMEN_BIN=target/debug/pramen ./scripts/quickstart.sh
