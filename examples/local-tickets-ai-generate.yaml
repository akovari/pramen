# Local governed `ai.generate` pipeline: NDJSON tickets on disk, one SQL
# cleanup step, one bounded-text generation step (deterministic mock
# provider), native COPY into PostgreSQL.
#
# Every generation is recorded in the durable inference ledger; re-running
# reuses recorded results. Output fields are UTF-8 with explicit maxChars,
# and maxOutputTokensPerRecord is required — over-long model output fails
# validation (no silent truncation).
#
#   export PRAMEN_POSTGRES_DSN=postgres://pramen:pramen@localhost:5432/pramen_dev
#   pramen run examples/local-tickets-ai-generate.yaml
#   pramen ai status
apiVersion: pramen.dev/v1alpha1
kind: Pipeline
metadata:
  name: local-tickets-ai-generate
spec:
  models:
    writer:
      provider: mock
      model: mock-1
  source:
    type: object_store
    url: /tmp/pramen-ai-input
    format:
      type: ndjson
  transforms:
    - id: clean
      type: sql
      query: >
        SELECT id, description
        FROM input
        WHERE description IS NOT NULL AND length(description) > 3
    - id: summarize
      type: ai.generate
      model: writer
      inputs: [description]
      instruction: >
        Write a one-sentence customer-facing summary of the support ticket.
      output:
        fields:
          - name: summary
            type: utf8
            maxChars: 160
      validation:
        onInvalid: fail
      budget:
        maxInputTokensPerRecord: 2048
        maxOutputTokensPerRecord: 64
  sink:
    type: postgres
    target: analytics.tickets_summarized
    mode: append
