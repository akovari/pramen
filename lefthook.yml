# Local gates that mirror CI Lint. Install path: `mise run setup-hooks`
# (sets local core.hooksPath=.githooks). Do not rely on `lefthook install`
# alone when a global core.hooksPath is set.
#
# Escape: LEFTHOOK=0 git commit|push

pre-commit:
  parallel: true
  jobs:
    - name: rustfmt
      glob: "*.rs"
      run: cargo fmt --all --check

pre-push:
  jobs:
    - name: lint
      # Identical to CI Lint / `mise run lint` (fmt + clippy, warnings denied).
      run: mise run lint
