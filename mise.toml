# Tool versions are pinned exactly; Renovate proposes updates.
[tools]
lefthook = "2.1.10"
"ubi:nextest-rs/nextest" = { version = "cargo-nextest-0.9.140", exe = "cargo-nextest", tag_regex = "^cargo-nextest" }
"ubi:taiki-e/cargo-llvm-cov" = "0.8.7"
"ubi:EmbarkStudios/cargo-deny" = "0.20.2"
git-cliff = "2.13.1"
"ubi:axodotdev/cargo-dist" = { version = "0.30.0", exe = "dist" }

[tasks.fmt]
description = "Format all Rust code"
run = "cargo fmt --all"

[tasks.lint]
description = "Format check + clippy with warnings denied"
run = [
    "cargo fmt --all --check",
    # Cargo-level warning denial (Rust 1.97+) instead of `-D warnings`:
    # same strictness, but it never invalidates the build cache.
    "cargo clippy --workspace --all-targets",
]
env = { CARGO_BUILD_WARNINGS = "deny" }

[tasks.test]
description = "Run unit/integration tests and doc tests"
run = [
    "cargo nextest run --workspace",
    "cargo test --doc --workspace",
]

[tasks.deny]
description = "Supply-chain checks: advisories, licenses, bans, sources"
run = "cargo deny check"

[tasks.cov]
description = "Coverage report (lcov.info + summary)"
run = "cargo llvm-cov nextest --workspace --lcov --output-path lcov.info --summary-only"

[tasks.docs]
description = "Build API docs with warnings denied"
run = "cargo doc --workspace --no-deps"
env = { RUSTDOCFLAGS = "-D warnings" }

[tasks.bench]
description = "Run criterion benchmarks"
run = "cargo bench --workspace"

[tasks.bench-e2e]
description = "End-to-end benchmark suite (needs PRAMEN_POSTGRES_DSN)"
run = "./scripts/bench.sh"

[tasks.rq2-memoization]
description = "Regenerate RQ2 memoization metrics (offline mock + ledger)"
run = "./scripts/rq2-memoization.sh"

[tasks.dispatch-frontier]
description = "Regenerate the E2.1 offline dispatch frontier Markdown"
run = "cargo run -q -p pramen -- ai dispatch-plan --sweep --out docs/research/e2-1-dispatch-frontier.md"

[tasks.perf-gate]
description = "Perf regression gate: designated benches vs the merge-base"
run = "./scripts/perf-gate.sh"

[tasks.release-quickstart]
description = "P2.2 gate: release binary + measured quickstart"
run = "./scripts/release-quickstart.sh"

[tasks.clean]
description = "Remove Rust build artifacts (frees target/ disk space)"
run = "rm -rf target spikes/*/target examples/external-wasm-guest/guest/target"

[tasks.wasm-external-guest]
description = "Rebuild the X2.1 third-party WASM guest (needs wasm32-wasip2)"
run = "./examples/external-wasm-guest/build.sh"

[tasks.wasm-external-conformance]
description = "Offline transform test against the checked-in third-party guest"
run = "cargo run -p pramen --quiet -- transform test --component examples/external-wasm-guest/dist/acme_gross.wasm"

[tasks.validate-deploy]
description = "Offline smoke check for deploy/ artifacts (X2.2; no AWS)"
run = "./scripts/validate-deploy.sh"

[tasks.compare-scoreboard]
description = "Regenerate competitive scoreboard from JSON + RQ2 metrics"
run = "./scripts/compare-scoreboard.sh"

[tasks.compare-scoreboard-check]
description = "Fail if compare-scoreboard.md/json is stale"
run = "./scripts/compare-scoreboard.sh --check"

[tasks.reproduce]
description = "E2.4: regenerate offline research figures (RQ2, frontier, scoreboard)"
run = "./scripts/reproduce-artifact.sh"

[tasks.reproduce-check]
description = "E2.4: fail if published research figures drift from generators"
run = "./scripts/reproduce-artifact.sh --check"

[tasks.ci]
description = "The full local gate; identical checks run in GitHub Actions"
depends = ["lint", "deny", "test", "docs", "validate-deploy", "reproduce-check"]
