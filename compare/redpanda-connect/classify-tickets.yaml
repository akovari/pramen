# Scaffold: Redpanda Connect + local Ollama (ADR 0009).
# Not executed in CI. Requires Redpanda Connect CLI and a running Ollama.
#
# Note: the branded `openai_chat_completion` processor is Enterprise-licensed
# in Connect 4.53. This harness uses the OSS `http` processor against Ollama's
# OpenAI-compatible API so the measured leg stays free (ADR 0009).
#
#   ollama pull llama3.2:3b
#   mkdir -p compare/redpanda-connect/out compare/redpanda-connect/fixtures
#   export COMPARE_REDPANDA=1
#   redpanda-connect run compare/redpanda-connect/classify-tickets.yaml
#
# Docs: https://docs.redpanda.com/redpanda-connect/

input:
  file:
    paths: [./fixtures/tickets.ndjson]
    scanner:
      lines: {}

pipeline:
  # Keep concurrency at 1 so a modest local Ollama is not overrun.
  threads: 1
  processors:
    - mapping: |
        let ticket = content().parse_json()
        meta id = $ticket.id
        meta description = $ticket.description
        root = {
          "model": "llama3.2:3b",
          "stream": false,
          "messages": [ {
            "role": "user",
            "content": """Classify the support ticket into a category and estimate a confidence score between 0 and 1. Reply with one JSON object only: {"category":"...","confidence":0.0}. Ticket: """ + $ticket.description
          } ]
        }
    - http:
        url: http://127.0.0.1:11434/v1/chat/completions
        verb: POST
        timeout: 120s
        retries: 2
        headers:
          Content-Type: application/json
          Authorization: "Bearer ollama"
    - mapping: |
        let resp = content().parse_json()
        root = {
          "id": meta("id"),
          "model": "llama3.2:3b",
          "response": $resp.choices.index(0).message.content
        }

output:
  file:
    path: ./out/classified.ndjson
    codec: lines
